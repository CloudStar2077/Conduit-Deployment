name: Deploy to VM

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Conduit-Container
        uses: actions/checkout@v6
        with:
          repository: CloudStar2077/Conduit-Container
          path: .

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/cloudstar2077/conduit-backend:latest
            ghcr.io/cloudstar2077/conduit-backend:${{ github.sha }}

      - name: Build & Push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/cloudstar2077/conduit-frontend:latest
            ghcr.io/cloudstar2077/conduit-frontend:${{ github.sha }}
          build-args: |
            API_BASE_URL=${{ secrets.API_BASE_URL }}

  prepare:
    name: Prepare & Copy Config
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout Deployment Repo
        uses: actions/checkout@v6

      - name: Create .env file
        run: |
          echo "DJANGO_SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}" > .env
          echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" >> .env
          echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" >> .env
          echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
          echo "DJANGO_ALLOWED_HOSTS=${{ secrets.DJANGO_ALLOWED_HOSTS }}" >> .env
          echo "PORT=${{ secrets.PORT }}" >> .env
          echo "API_BASE_URL=${{ secrets.API_BASE_URL }}" >> .env
          echo "IMAGE_TAG=${{ github.sha }}" >> .env

      - name: Copy .env and docker-compose.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: ".env,docker-compose.yml"
          target: "/home/Conduit-Deployment"

  deploy:
    name: Deploy to VM
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            cd /home/Conduit-Deployment
